{% extends 'base.html' %}

{% block content %}

<h1>My Profile</h1>

<p><strong>Username:</strong> {{ user.username }}</p>

<p><strong>Email:</strong> {{ user.email }}</p>

<hr>

<h3>My Orders</h3>

{% for order in orders %}

<div class="card mb-3">
    <div class="card-body">

        <p>
            <strong>Name:</strong>
            {{ order.full_name }}
        </p>

        <p>
            <strong>Date:</strong>
            {{ order.created_at }}
        </p>

        <p>
            <strong>Total:</strong>
            £{{ order.total }}
        </p>

    </div>
</div>

{% empty %}

<p>No orders yet.</p>

{% endfor %}

{% endblock %}
