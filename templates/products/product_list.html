{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Products</h1>

<div class="row">

    {% for product in products %}

    <div class="col-md-4 mb-4">
        <div class="card">

            <div class="card-body">
                <h5>{{ product.name }}</h5>

                <p>
                    {{ product.description|truncatechars:80 }}
                </p>

                <p>
                    <strong>£{{ product.price }}</strong>
                </p>

                <p>
                    Stock: {{ product.stock }}
                </p>
                <a href="{% url 'product_detail' product.id %}" class="btn btn-primary">
                    View Details
                </a>

                <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
                    Add To Cart
                </a>
            </div>

        </div>
    </div>

    {% endfor %}

</div>

{% endblock %}
