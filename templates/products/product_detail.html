{% extends 'base.html' %}

{% block content %}

<h1>{{ product.name }}</h1>

<hr>

<p>
    <strong>Category:</strong>
    {{ product.category }}
</p>

<p>
    <strong>Description:</strong>
    {{ product.description }}
</p>

<p>
    <strong>Price:</strong>
    £{{ product.price }}
</p>

<p>
    <strong>Stock:</strong>
    {{ product.stock }}
</p>

<a href="/products/" class="btn btn-secondary">
    Back
</a>

<a href="{% url 'add_to_cart' product.id %}"
   class="btn btn-primary">
    Add To Cart
</a>

{% endblock %}
