{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h1>Your Cart</h1>

    {% for item in products %}

    <div class="card mb-3">
        <div class="card-body">
            <h5>{{ item.product.name }}</h5>

            <p>Quantity: {{ item.quantity }}</p>

            <p>Subtotal: £{{ item.subtotal }}</p>
        </div>
    </div>

    {% empty %}

    <p>Your cart is empty.</p>

    {% endfor %}

    <h3>Total: £{{ total }}</h3>

</div>

{% endblock %}
