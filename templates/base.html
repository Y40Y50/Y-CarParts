{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y-CarParts</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="/">Y-CarParts</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <div class="ms-auto">
                    <a href="{% url 'home' %}"
                        class="btn {% if request.path == '/' %}btn-primary{% else %}btn-outline-light{% endif %}">
                        Home
                    </a>

                    <a href="{% url 'products' %}"
                        class="btn {% if '/products' in request.path %}btn-primary{% else %}btn-outline-light{% endif %}">
                        Products
                    </a>

                    <a href="{% url 'cart' %}"
                        class="btn {% if request.path == '/cart/' %}btn-primary{% else %}btn-outline-light{% endif %}">
                        Cart ({{ cart_count }})
                    </a>
                </div>

            </div>

        </div>
    </nav>

    <div class="container-fluid px-5 mt-4">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
